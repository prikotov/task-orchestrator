services:
  _defaults:
    autowire: true
    autoconfigure: true

  # --- Тегирование всех AgentRunnerInterface реализаций ---
  _instanceof:
    TaskOrchestrator\Common\Module\AgentRunner\Domain\Service\AgentRunnerInterface:
      tags: ['agent.runner']

  # --- Auto-discovery (Application + Infrastructure, Domain исключён) ---
  TaskOrchestrator\:
    resource: '../src/*'
    exclude:
      - '../src/Common/Module/Orchestrator/Domain/'
      - '../src/Common/Module/AgentRunner/Domain/'
      - '../src/DependencyInjection/'
      - '../src/Infrastructure/Symfony/'
      - '../src/Common/Module/AgentRunner/Infrastructure/Service/RetryingAgentRunner.php'
      - '../src/Common/Module/AgentRunner/Infrastructure/Service/CircuitBreakerAgentRunner.php'

  # --- Integration Service alias (Interface → Implementation by convention service.md) ---
  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Integration\RunAgentServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Integration\Service\AgentRunner\RunAgentService

  # --- Явные alias: Interface → Implementation (по конвенции service.md) ---
  TaskOrchestrator\Common\Module\AgentRunner\Domain\Service\AgentRunnerInterface:
    alias: TaskOrchestrator\Common\Module\AgentRunner\Infrastructure\Service\Pi\PiAgentRunner

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Shared\ChainLoaderInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\YamlChainLoader

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Session\ChainSessionLoggerInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\ChainSessionLogger

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Session\ChainSessionWriterInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\ChainSessionLogger

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Session\ChainSessionReaderInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\ChainSessionLogger

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Shared\FacilitatorResponseParserInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\FacilitatorResponseParserService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Audit\AuditLoggerFactoryInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\JsonlAuditLoggerFactory

  # Audit logger по умолчанию — JSONL с путём из task_orchestrator.audit_log_path
  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Audit\AuditLoggerInterface:
    factory: ['@TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\JsonlAuditLoggerFactory', 'create']
    arguments:
      $logFilePath: '%task_orchestrator.audit_log_path%'

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Shared\QualityGateRunnerInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\QualityGateRunner

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Prompt\PromptProviderInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Prompt\RolePromptBuilder

  # --- Application Service alias ---
  TaskOrchestrator\Common\Module\Orchestrator\Application\Service\Chain\ExecuteStaticChainServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Application\Service\Chain\ExecuteStaticChainService

  # --- Infrastructure Service alias ---
  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Shared\ResolveChainRunnerServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\ResolveChainRunnerService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RunDynamicLoopAgentServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\RunDynamicLoopAgentService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Budget\CheckDynamicBudgetServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\CheckDynamicBudgetService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Shared\PromptFormatterInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\PromptFormatterService

  # --- Domain Service alias (explicit registration, Domain excluded from auto-discovery) ---
  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RunDynamicLoopServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RunDynamicLoopService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RunDynamicLoopService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RecordDynamicRoundServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RecordDynamicRoundService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\RecordDynamicRoundService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\FormatDynamicJournalServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\FormatDynamicJournalService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\FormatDynamicJournalService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\BuildDynamicContextServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\BuildDynamicContextService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\BuildDynamicContextService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Static\CheckStaticBudgetServiceInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Static\CheckStaticBudgetService

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Static\CheckStaticBudgetService
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Static\RunStaticChainService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Static\ExecuteStaticStepService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Dynamic\ExecuteDynamicTurnService:
    autowire: true

  TaskOrchestrator\Common\Module\Orchestrator\Domain\Service\Chain\Shared\RoundCompletedNotifierInterface:
    alias: TaskOrchestrator\Common\Module\Orchestrator\Application\Service\Chain\DispatchRoundEventService

  # Report format mappers
  TaskOrchestrator\Common\Module\Orchestrator\Application\UseCase\Query\GenerateReport\ReportResultFactory:
    arguments:
      $mappers:
        text: '@TaskOrchestrator\Common\Module\Orchestrator\Application\Mapper\ReportTextMapper'
        json: '@TaskOrchestrator\Common\Module\Orchestrator\Application\Mapper\ReportJsonMapper'

  # --- AgentRunner module services ---
  TaskOrchestrator\Common\Module\AgentRunner\Domain\Service\AgentRunnerRegistryServiceInterface:
    alias: TaskOrchestrator\Common\Module\AgentRunner\Domain\Service\AgentRunnerRegistryService

  TaskOrchestrator\Common\Module\AgentRunner\Domain\Service\RetryableRunnerFactoryInterface:
    alias: TaskOrchestrator\Common\Module\AgentRunner\Infrastructure\Service\RetryableRunnerFactory

  # --- Registry с tagged iterator ---
  TaskOrchestrator\Common\Module\AgentRunner\Domain\Service\AgentRunnerRegistryService:
    arguments:
      $runners: !tagged_iterator agent.runner

  # --- Параметры путей (через bundle configuration) ---
  TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Prompt\RolePromptBuilder:
    arguments:
      $rolesDir: '%task_orchestrator.roles_dir%'
      $basePath: '%task_orchestrator.base_path%'

  TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\YamlChainLoader:
    arguments:
      $yamlPath: '%task_orchestrator.chains_yaml%'

  TaskOrchestrator\Common\Module\Orchestrator\Infrastructure\Service\Chain\ChainSessionLogger:
    arguments:
      $chainsSessionDir: '%task_orchestrator.chains_session_dir%'
      $basePath: '%task_orchestrator.base_path%'
